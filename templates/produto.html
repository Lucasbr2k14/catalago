{% for prod in produtos %}
<div class="produto">
    <h3> {{ prod.nome }}</h3>
    
    <img src="static/{{ prod['imagem'] }}" />
    
    <div class = "items">
        
        <p>
            Items 
            <span class="seta">
                &#9656;
            </span>
        </p>
            
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Qtd.</th>
                    <th>Preço</th>
                </tr>
            </thead>
            <tbody>    
                {% for comp in prod.componentes %}
                <tr>
                    <td>{{ comp.nome }}</td>
                    <td>{{ comp.quantidade }}</td> 
                    <td> <span class="preco"> R$ {{ "%.2f"|format(comp.preço)|replace(".",",") }} </span> </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <p class="total">
        Total: <span class="preco"> R$ {{ "%.2f"|format(prod.total)|replace(".",",") }} </span>
    </p>
</div>
{% endfor %}
